services:
  postgres:
    image: postgres:16-alpine
    container_name: we-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wecrm
    ports:
      - "5432:5432"
    volumes:
      - we_crm_postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wecrm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  we_crm_postgres_data:
